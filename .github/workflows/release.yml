name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_PART1: ${{ secrets.APPLE_CERTIFICATE_1 }}
          CERTIFICATE_PART2: ${{ secrets.APPLE_CERTIFICATE_2 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "${CERTIFICATE_PART1}${CERTIFICATE_PART2}" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive
        run: |
          cd claudeglance
          xcodebuild \
            -scheme ClaudeGlance \
            -configuration Release \
            -archivePath build/ClaudeGlance.xcarchive \
            archive

      - name: Export (Developer ID signed)
        run: |
          cd claudeglance
          xcodebuild -exportArchive \
            -archivePath build/ClaudeGlance.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd claudeglance
          ditto -c -k --keepParent build/export/ClaudeGlance.app ClaudeGlance.zip
          xcrun notarytool submit ClaudeGlance.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple
        run: |
          cd claudeglance
          xcrun stapler staple build/export/ClaudeGlance.app
          ditto -c -k --keepParent build/export/ClaudeGlance.app ClaudeGlance.zip

      - name: Build DMG
        run: |
          VOL_NAME="ClaudeGlance" scripts/make-dmg.sh \
            claudeglance/build/export/ClaudeGlance.app \
            claudeglance/ClaudeGlance.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claudeglance/ClaudeGlance.dmg
            claudeglance/ClaudeGlance.zip
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          SHA=$(shasum -a 256 claudeglance/ClaudeGlance.dmg | awk '{print $1}')

          FORMULA="cask \"claudeglance\" do
            version \"$VERSION\"
            sha256 \"$SHA\"

            url \"https://github.com/broots144/claudeglance/releases/download/v#{version}/ClaudeGlance.dmg\"
            name \"ClaudeGlance\"
            desc \"macOS menu bar app showing Claude.ai plan usage in real time\"
            homepage \"https://github.com/broots144/claudeglance\"

            app \"ClaudeGlance.app\"

            zap trash: [
              \"~/Library/Preferences/io.github.broots144.ClaudeGlance.plist\",
              \"~/Library/Application Support/ClaudeGlance\",
            ]
          end"

          ENCODED=$(echo "$FORMULA" | base64)

          # Get current file SHA (needed to update an existing cask file)
          CURRENT=$(curl -s \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            https://api.github.com/repos/broots144/homebrew-tap/contents/Casks/claudeglance.rb)
          FILE_SHA=$(echo "$CURRENT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))")

          curl -s -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/broots144/homebrew-tap/contents/Casks/claudeglance.rb \
            -d "{\"message\":\"Update claudeglance to $VERSION\",\"content\":\"$ENCODED\",\"sha\":\"$FILE_SHA\"}"
